name: planbition_app
description: "Planbition Self Schedule — medewerkers app voor planning, beschikbaarheid en tijdregistratie."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.8.0

  # Navigation
  go_router: ^14.8.1

  # Models (code generation)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Secure storage (tokens)
  flutter_secure_storage: ^9.2.4

  # Geolocation (geofencing)
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Images
  cached_network_image: ^3.4.1

  # Internationalisation
  intl: ^0.20.2

  # Push notifications
  flutter_local_notifications: ^18.0.1

  # Icons & UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Utilities
  equatable: ^2.0.7
  logger: ^2.5.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.1
  riverpod_lint: ^2.6.1
  custom_lint: ^0.7.5

  # Testing
  mocktail: ^1.0.4
  http_mock_adapter: ^0.6.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
